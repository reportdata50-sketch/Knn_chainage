                <!-- -------------------Panel code for creating satrt and end point---------------- -->
                <div id="uniqueIdPanel" class="uid-panel hidden">
                    <div class="uid-header">
                        <span>Select Road Segments</span>
                        <button id="closeUniqueIdPanel" class="uid-close">✕</button>
                    </div>

                    <div class="uid-body">
                        <!-- Road ID as a text box -->
                        <div class="uid-field">
                            <label for="road">Road Id -
                                <input type="text" id="road" class="input-field" readonly />
                                <!-- Road ID displayed in a text box -->
                            </label>

                            <label for="zoneNo">Zone No. -
                                <input type="text" id="zoneNo" class="input-field" readonly />
                                <!-- Zone No displayed in a text box -->
                            </label>

                            <label for="wardNo">Ward No. -
                                <input type="text" id="wardNo" class="input-field" readonly />
                                <!-- Ward No displayed in a text box -->
                            </label>

                            <label for="RoadName">Rd Name -
                                <input type="text" id="RoadName" class="input-field" readonly />
                                <!-- Road Name displayed in a text box -->
                            </label>
                        </div>

                        <div class="uid-field">
                            <label for="startPoint">Start Chainage
                                <select id="startPoint" class="input-field"></select>
                            </label>
                        </div>

                        <div class="uid-field">
                            <label for="endPoint">End Chainage
                                <select id="endPoint" class="input-field"></select>
                            </label>
                        </div>
                    </div>

                    <div class="uid-footer">
                        <button id="submitUniqueId" class="uid-btn primary">Create Patch</button>
                    </div>


                </div>

                    <label>

                    <label style="margin-left:10px;">
